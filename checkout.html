<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Оформление заказа - Sentimental.videos</title>
    
    <!-- Google tag (gtag.js) - GA4 + Google Ads -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-P6JRM22MPE"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-P6JRM22MPE');
        gtag('config', 'AW-18107391899');
    </script>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: {
                            50: '#fef7ee',
                            100: '#fdecd1',
                            200: '#fad4a3',
                            300: '#f6b468',
                            400: '#f18a3a',
                            500: '#ed6f1c',
                            600: '#dd5a0e',
                            700: '#b8460f',
                            800: '#933813',
                            900: '#772f13',
                        },
                        neutral: {
                            50: '#fafafa',
                            100: '#f5f5f5',
                            200: '#e5e5e5',
                            300: '#d4d4d4',
                            400: '#a3a3a3',
                            500: '#737373',
                            600: '#525252',
                            700: '#404040',
                            800: '#262626',
                            900: '#171717',
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="min-h-screen bg-white">
    <!-- Header -->
    <header class="sticky top-0 left-0 right-0 z-50 bg-white bg-opacity-95 backdrop-blur-sm border-b border-neutral-100">
        <div class="container mx-auto px-4 py-4">
            <div class="flex items-center justify-between">
                <div class="flex items-center">
                    <img src="./Assets/img/Centimental-logo.jpg" alt="Sentimental.videos" class="h-14 md:h-16 w-auto">
                </div>
                <a href="index.html" class="text-neutral-600 hover:text-primary-600 transition">
                    ← Назад
                </a>
            </div>
        </div>
    </header>

    <!-- Order Form -->
    <section class="py-20 bg-gradient-to-br from-primary-50 to-white">
        <div class="container mx-auto px-4">
            <div class="max-w-2xl mx-auto">
                <div class="bg-white rounded-lg shadow-sm border border-neutral-200 p-8">
                    <h1 class="text-3xl font-bold text-neutral-900 mb-8 text-center">
                        Оформление заказа
                    </h1>
                    
                    <!-- Selected Package Info -->
                    <div id="packageInfo" class="bg-primary-50 rounded-lg p-4 mb-6 hidden">
                        <div class="flex justify-between items-center">
                            <div>
                                <p class="text-sm text-neutral-600">Выбранный пакет:</p>
                                <p id="packageName" class="font-bold text-neutral-900">-</p>
                            </div>
                            <div class="text-right">
                                <p id="packagePrice" class="text-2xl font-bold text-primary-600">- MDL</p>
                            </div>
                        </div>
                        <p id="packageDetails" class="text-sm text-neutral-600 mt-2">-</p>
                    </div>
                    
                    <form id="orderForm" class="space-y-6">
                        <!-- Name Field -->
                        <div>
                            <label for="name" class="block text-sm font-medium text-neutral-700 mb-2">
                                Имя <span class="text-red-500">*</span>
                            </label>
                            <input 
                                type="text" 
                                id="name" 
                                name="name" 
                                required
                                class="w-full px-4 py-3 border border-neutral-300 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-transparent"
                                placeholder="Ваше имя">
                        </div>

                        <!-- Email Field -->
                        <div>
                            <label for="email" class="block text-sm font-medium text-neutral-700 mb-2">
                                Email <span class="text-red-500">*</span>
                            </label>
                            <input 
                                type="email" 
                                id="email" 
                                name="email" 
                                required
                                class="w-full px-4 py-3 border border-neutral-300 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-transparent"
                                placeholder="your@email.com">
                        </div>

                        <!-- Contact Field -->
                        <div>
                            <label for="contact" class="block text-sm font-medium text-neutral-700 mb-2">
                                Telegram, WhatsApp или Viber <span class="text-red-500">*</span>
                            </label>
                            <input 
                                type="text" 
                                id="contact" 
                                name="contact" 
                                required
                                class="w-full px-4 py-3 border border-neutral-300 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-transparent"
                                placeholder="+373 12 345 6789 или @username">
                        </div>

                        <!-- Comment Field -->
                        <div>
                            <label for="comment" class="block text-sm font-medium text-neutral-700 mb-2">
                                Комментарий (необязательно)
                            </label>
                            <textarea 
                                id="comment" 
                                name="comment" 
                                rows="4"
                                class="w-full px-4 py-3 border border-neutral-300 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-transparent"
                                placeholder="Дополнительная информация о вашем заказе"></textarea>
                        </div>

                        <!-- Agreement Checkbox -->
                        <div>
                            <label class="flex items-start space-x-2">
                                <input 
                                    type="checkbox" 
                                    id="agreement" 
                                    name="agreement" 
                                    required
                                    class="mt-1 h-4 w-4 text-primary-600 border-neutral-300 rounded focus:ring-primary-500">
                                <span class="text-sm text-neutral-600">
                                    Я понимаю, что после оплаты мне нужно будет отправить до 10 старых фото и утвердить получившиеся видео для наилучшего результата
                                </span>
                            </label>
                        </div>

                        <!-- Submit Button -->
                        <div>
                            <button 
                                type="submit" 
                                class="w-full bg-primary-600 hover:bg-primary-700 text-white px-6 py-3 rounded-lg font-semibold transition">
                                Перейти к оплате
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </section>

    <script>
        // Generate order reference
        function generateOrderRef() {
            const timestamp = Date.now();
            const random = Math.floor(Math.random() * 1000);
            return `SV${timestamp.toString().slice(-4)}${random}`;
        }

        // Display selected package
        function displaySelectedPackage() {
            const packageData = localStorage.getItem('selectedPackage');
            if (packageData) {
                const pkg = JSON.parse(packageData);
                document.getElementById('packageInfo').classList.remove('hidden');
                document.getElementById('packageName').textContent = pkg.name;
                document.getElementById('packagePrice').textContent = pkg.priceMDL + ' MDL';
                document.getElementById('packageDetails').textContent = 
                    `${pkg.videosPerPhoto} варианта на ${pkg.maxPhotos} фото = ${pkg.totalVideos} кусочков видео • ${pkg.timeline} • ${pkg.model}`;
            }
        }

        // Show package on page load
        displaySelectedPackage();

        // Google Apps Script URL - ЗАМЕНИТЕ НА ВАШ URL ПОСЛЕ РАЗВЕРТЫВАНИЯ
        const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycby93zURRC3iZRk-d1Blwt9AIFv4HCSsxkxb7InH2fEFqRVIjfGP_fQmD1su0WAegfjRJQ/exec';
        
        // Send order to Google Sheets
        async function sendOrderToGoogleSheets(orderData) {
            try {
                const response = await fetch(GOOGLE_SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify({
                        orderRef: orderData.orderRef,
                        name: orderData.name,
                        email: orderData.email,
                        contact: orderData.contact,
                        packageName: orderData.package ? orderData.package.name : 'Standard',
                        priceMDL: orderData.package ? orderData.package.priceMDL : 530,
                        comment: orderData.comment,
                        status: 'New'
                    })
                });
                const result = await response.json();
                console.log('Google Sheets result:', result);
                return result;
            } catch (error) {
                console.error('Error sending to Google Sheets:', error);
                // Continue even if Google Sheets fails - don't block the order
                return { result: 'error', message: error.message };
            }
        }

        // Handle form submission
        document.getElementById('orderForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            // Validate form
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const contact = document.getElementById('contact').value;
            const comment = document.getElementById('comment').value;
            const agreement = document.getElementById('agreement').checked;
            
            if (!name || !email || !contact || !agreement) {
                alert('Пожалуйста, заполните все обязательные поля');
                return;
            }
            
            // Get selected package
            const packageData = localStorage.getItem('selectedPackage');
            const pkg = packageData ? JSON.parse(packageData) : { name: 'Runway Gen 4', priceMDL: 530, videosPerPhoto: 3, maxPhotos: 7, totalVideos: 21, timeline: '1 неделя', model: 'Runway Gen 4' };
            
            // Store order data
            const orderData = {
                orderRef: generateOrderRef(),
                name: name,
                email: email,
                contact: contact,
                comment: comment,
                package: pkg,
                timestamp: new Date().toISOString()
            };
            
            localStorage.setItem('currentOrder', JSON.stringify(orderData));
            
            // Send to Google Sheets
            await sendOrderToGoogleSheets(orderData);
            
            // Track checkout form submission in GA
            gtag('event', 'checkout_form_submit', {
                'event_category': 'funnel',
                'event_label': pkg.name,
                'value': pkg.priceMDL
            });
            
            // Redirect to payment
            window.location.href = `payment.html?order=${orderData.orderRef}`;
        });
    </script>
</body>
</html>
