<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Оформление заказа - Sentimental.videos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: {
                            50: '#fef7ee',
                            100: '#fdecd1',
                            200: '#fad4a3',
                            300: '#f6b468',
                            400: '#f18a3a',
                            500: '#ed6f1c',
                            600: '#dd5a0e',
                            700: '#b8460f',
                            800: '#933813',
                            900: '#772f13',
                        },
                        neutral: {
                            50: '#fafafa',
                            100: '#f5f5f5',
                            200: '#e5e5e5',
                            300: '#d4d4d4',
                            400: '#a3a3a3',
                            500: '#737373',
                            600: '#525252',
                            700: '#404040',
                            800: '#262626',
                            900: '#171717',
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="min-h-screen bg-white">
    <!-- Header -->
    <header class="sticky top-0 left-0 right-0 z-50 bg-white bg-opacity-95 backdrop-blur-sm border-b border-neutral-100">
        <div class="container mx-auto px-4 py-4">
            <div class="flex items-center justify-between">
                <div class="flex items-center space-x-3">
                    <div class="bg-white p-2 rounded-lg shadow-sm">
                        <img src="./Assets/img/Centimental-logo.jpg" alt="Sentimental.videos" class="h-12 w-auto">
                    </div>
                    <span class="text-xl font-bold text-neutral-900">Sentimental.videos</span>
                </div>
                <a href="index.html" class="text-neutral-600 hover:text-primary-600 transition">
                    ← Назад
                </a>
            </div>
        </div>
    </header>

    <!-- Order Form -->
    <section class="py-20 bg-gradient-to-br from-primary-50 to-white">
        <div class="container mx-auto px-4">
            <div class="max-w-2xl mx-auto">
                <div class="bg-white rounded-lg shadow-sm border border-neutral-200 p-8">
                    <h1 class="text-3xl font-bold text-neutral-900 mb-8 text-center">
                        Оформление заказа
                    </h1>
                    
                    <form id="orderForm" class="space-y-6">
                        <!-- Name Field -->
                        <div>
                            <label for="name" class="block text-sm font-medium text-neutral-700 mb-2">
                                Имя <span class="text-red-500">*</span>
                            </label>
                            <input 
                                type="text" 
                                id="name" 
                                name="name" 
                                required
                                class="w-full px-4 py-3 border border-neutral-300 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-transparent"
                                placeholder="Ваше имя">
                        </div>

                        <!-- Email Field -->
                        <div>
                            <label for="email" class="block text-sm font-medium text-neutral-700 mb-2">
                                Email <span class="text-red-500">*</span>
                            </label>
                            <input 
                                type="email" 
                                id="email" 
                                name="email" 
                                required
                                class="w-full px-4 py-3 border border-neutral-300 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-transparent"
                                placeholder="your@email.com">
                        </div>

                        <!-- Contact Field -->
                        <div>
                            <label for="contact" class="block text-sm font-medium text-neutral-700 mb-2">
                                Telegram, WhatsApp или Viber <span class="text-red-500">*</span>
                            </label>
                            <input 
                                type="text" 
                                id="contact" 
                                name="contact" 
                                required
                                class="w-full px-4 py-3 border border-neutral-300 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-transparent"
                                placeholder="+373 12 345 6789 или @username">
                        </div>

                        <!-- Comment Field -->
                        <div>
                            <label for="comment" class="block text-sm font-medium text-neutral-700 mb-2">
                                Комментарий (необязательно)
                            </label>
                            <textarea 
                                id="comment" 
                                name="comment" 
                                rows="4"
                                class="w-full px-4 py-3 border border-neutral-300 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-transparent"
                                placeholder="Дополнительная информация о вашем заказе"></textarea>
                        </div>

                        <!-- Agreement Checkbox -->
                        <div>
                            <label class="flex items-start space-x-2">
                                <input 
                                    type="checkbox" 
                                    id="agreement" 
                                    name="agreement" 
                                    required
                                    class="mt-1 h-4 w-4 text-primary-600 border-neutral-300 rounded focus:ring-primary-500">
                                <span class="text-sm text-neutral-600">
                                    Я понимаю, что после оплаты мне нужно будет отправить до 10 старых фото и утвердить получившиеся видео для наилучшего результата
                                </span>
                            </label>
                        </div>

                        <!-- Submit Button -->
                        <div>
                            <button 
                                type="submit" 
                                class="w-full bg-primary-600 hover:bg-primary-700 text-white px-6 py-3 rounded-lg font-semibold transition">
                                Перейти к оплате
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </section>

    <script>
        // Generate order reference
        function generateOrderRef() {
            const timestamp = Date.now();
            const random = Math.floor(Math.random() * 1000);
            return `SV${timestamp.toString().slice(-4)}${random}`;
        }

        // Handle form submission
        document.getElementById('orderForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            // Validate form
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const contact = document.getElementById('contact').value;
            const comment = document.getElementById('comment').value;
            const agreement = document.getElementById('agreement').checked;
            
            if (!name || !email || !contact || !agreement) {
                alert('Пожалуйста, заполните все обязательные поля');
                return;
            }
            
            // Store order data
            const orderData = {
                orderRef: generateOrderRef(),
                name: name,
                email: email,
                contact: contact,
                comment: comment,
                timestamp: new Date().toISOString()
            };
            
            localStorage.setItem('currentOrder', JSON.stringify(orderData));
            
            // Redirect to payment
            window.location.href = `payment.html?order=${orderData.orderRef}`;
        });
    </script>
</body>
</html>
